<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - SAUFSHOP</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-container">
            <div class="header-top">
                <div class="logo"><a href="index.html" style="text-decoration: none; color: var(--gold);">🍷 SAUFSHOP</a></div>
                <div class="header-right">
                    <div class="search-box">
                        <input type="text" id="headerSearch" placeholder="Wein suchen..." />
                        <button onclick="searchWines()">🔍</button>
                    </div>
                    <div class="cart-badge">
                        🛒 <span id="cartCount">0</span>
                    </div>
                </div>
            </div>
            
            <nav>
                <a href="index.html">Home</a>
                <a href="shop.html" class="active">Shop</a>
                <a href="about.html">Über uns</a>
                <a href="contact.html">Kontakt</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <h1 style="margin-bottom: 2rem;">Unser Sortiment</h1>
        
        <div class="shop-container">
            <div>
                <div class="shop-controls">
                    <div class="filter-group">
                        <label>Nach Name:</label>
                        <input type="text" id="nameFilter" placeholder="Wein suchen..." onkeyup="filterProducts()" />
                    </div>
                    <div class="filter-group">
                        <label>Kategorie:</label>
                        <select id="categoryFilter" onchange="filterProducts()">
                            <option value="">Alle Kategorien</option>
                            <option value="Bordeaux">Bordeaux</option>
                            <option value="Loire Valley">Loire Valley</option>
                            <option value="Provence">Provence</option>
                            <option value="Venetien">Venetien</option>
                            <option value="Burgund">Burgund</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Maximal Preis:</label>
                        <input type="number" id="priceFilter" placeholder="z.B. 50" onkeyup="filterProducts()" />
                    </div>
                </div>
                
                <div class="products-grid" id="productsGrid"></div>
            </div>
            
            <div class="cart-box">
                <div class="cart-title">Warenkorb</div>
                <div class="cart-items" id="cartItems">
                    <p style="text-align: center; color: var(--text-secondary); font-size: 0.9rem;">Leer</p>
                </div>
                
                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Waren:</span>
                        <span id="subtotal">0,00€</span>
                    </div>
                    <div class="summary-row">
                        <span>Versand:</span>
                        <span id="shipping">5,99€</span>
                    </div>
                    <div class="summary-row total">
                        <span>Gesamt:</span>
                        <span id="total">5,99€</span>
                    </div>
                </div>
                
                <div class="checkout-sections">
                    <div class="option-box">
                        <label><input type="radio" name="shipping" value="standard" checked /> Standard (5,99€)</label>
                        <label><input type="radio" name="shipping" value="express" /> Express (9,99€)</label>
                    </div>
                    <div class="option-box">
                        <label><input type="radio" name="payment" value="paypal" checked /> PayPal</label>
                        <label><input type="radio" name="payment" value="creditcard" /> Kreditkarte</label>
                    </div>
                    <button class="checkout-btn" id="checkoutBtn" disabled onclick="checkout()">BESTELLUNG AUFGEBEN</button>
                </div>
            </div>
        </div>
    </div>

    <!-- CONFIRMATION MODAL -->
    <div class="modal" id="confirmationModal">
        <div class="modal-content">
            <div class="modal-icon">✅</div>
            <h2>Bestellung erfolgreich!</h2>
            <p>Danke für deine Bestellung! Deine Transaktion wurde erfolgreich verarbeitet.</p>
            <div id="confirmationDetails"></div>
            <button class="modal-btn" onclick="location.href='index.html'">Zurück zur Startseite</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            updateCart();
        });

        // Search from header
        function searchWines() {
            const query = document.getElementById('headerSearch').value;
            document.getElementById('nameFilter').value = query;
            filterProducts();
        }
    </script>
</body>
</html>
